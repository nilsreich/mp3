# fly.toml app configuration file generated for mp3 on 2026-04-16T21:50:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mp3'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 0
  memory_mb = 256

[mounts]
  source = "data"
  destination = "/data"
